{% extends 'base.html' %}

{% block title %}Follow Up Submitted - GBV System{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="main-container text-center">
            <div class="mb-4">
                <i class="bi bi-check-circle-fill" style="font-size: 5rem; color: #28a745;"></i>
            </div>
            <h1 class="mb-3">Follow-up Sent</h1>
            <p class="lead mb-4">Thank you for your update. We have recorded your follow-up and our team will review it confidentially.</p>

            <div class="mt-4">
                <a href="{% url 'landing' %}" class="btn btn-primary btn-submit">
                    <i class="bi bi-house-fill me-2"></i>Return to Home
                </a>
                <a href="{% url 'follow_up' %}" class="btn btn-outline-secondary btn-submit ms-2">
                    <i class="bi bi-chat-dots me-2"></i>Submit another follow-up
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
